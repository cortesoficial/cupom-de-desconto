<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Automobilístico CS | Cupom de Desconto</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #08090c;
            --card-bg: rgba(18, 19, 26, 0.8);
            --neon-purple: #a855f7;
            --neon-magenta: #d946ef;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #00ff87;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Fundo com efeito de Garagem de Estética Automotiva */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(8, 9, 12, 0.95), rgba(24, 12, 44, 0.85)),
                url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?auto=format&fit=crop&q=80&w=1920') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* Iluminação Roxa Neon no Fundo (Baseada na sua Logo) */
        .neon-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Container Principal Premium */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9), 0 0 20px rgba(168, 85, 247, 0.1);
        }

        /* Espaço para a Logomarca Oficial */
        .logo-container {
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            background-color: #000;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: 1px;
            line-height: 1.3;
            margin-bottom: 12px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Grid de Imagens Inspiradas no Feed do seu Print */
        .insta-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .insta-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
            transition: all 0.4s ease;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .insta-preview-grid:hover .insta-img {
            filter: brightness(1) contrast(1);
            border-color: rgba(168, 85, 247, 0.4);
        }

        /* Botões Estilizados */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            margin-bottom: 16px;
        }

        .btn-insta {
            background: linear-gradient(135deg, #8a3ab9. 0%, #e95950 50%, #fccc63 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(138, 58, 185, 0.3);
        }

        .btn-insta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(138, 58, 185, 0.5);
        }

        .btn-lucky {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-magenta));
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn-lucky:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        .btn-lucky:disabled {
            background: #1e1f26;
            color: #4b5263;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Mensagens de Feedback */
        .status-box {
            font-size: 0.9rem;
            color: var(--neon-purple);
            min-height: 25px;
            margin-top: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* Bilhete de Cupom */
        .coupon-wrapper {
            margin-top: 25px;
            padding: 24px;
            background: rgba(0, 255, 135, 0.04);
            border: 2px dashed rgba(0, 255, 135, 0.3);
            border-radius: 16px;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .coupon-title {
            color: var(--success);
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .coupon-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success);
            letter-spacing: 4px;
            background: rgba(0, 255, 135, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.3);
        }

        .coupon-instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 12px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="neon-glow"></div>

    <div class="card">
        <!-- Logo da Sua Loja -->
        <div class="logo-container">
            <img class="logo-img" src="image_58a500.png" alt="Centro Automobilístico CS Logo">
        </div>

        <h1>Estética & Sorte</h1>
        <p class="subtitle">Siga nosso perfil e verifique se o seu veículo foi premiado com um desconto exclusivo este mês.</p>

        <!-- Fotos alinhadas aos cuidados e estética do seu feed -->
        <div class="insta-preview-grid">
            <img class="insta-img" src="https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?auto=format&fit=crop&q=60&w=300" alt="Lavagem Automotiva Técnica">
            <img class="insta-img" src="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=60&w=300" alt="Produtos de Limpeza de Rodas">
            <img class="insta-img" src="https://images.unsplash.com/photo-1563720223185-11003d516935?auto=format&fit=crop&q=60&w=300" alt="Polimento e Brilho">
        </div>

        <!-- Passo 1 -->
        <a href="https://www.instagram.com/centroautomobilistico.cs/" target="_blank" id="btn-insta" class="btn btn-insta">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Seguir no Instagram
        </a>

        <!-- Passo 2 -->
        <button id="btn-lucky" class="btn btn-lucky" disabled>
            Tentar a Sorte
        </button>

        <div id="status-message" class="status-box"></div>

        <!-- Painel do Cupom -->
        <div id="coupon-box" class="coupon-wrapper">
            <div class="coupon-title">⚡ Veículo Premiado ⚡</div>
            <div class="coupon-code" id="coupon-code">CSDEZ</div>
            <p class="coupon-instructions">Tire um print para validar o seu desconto no atendimento!</p>
        </div>
    </div>

    <script>
        const CODIGO_CUPOM = "CSDEZ"; 

        const btnInsta = document.getElementById('btn-insta');
        const btnLucky = document.getElementById('btn-lucky');
        const couponBox = document.getElementById('coupon-box');
        const couponCode = document.getElementById('coupon-code');
        const statusMessage = document.getElementById('status-message');

        if (!localStorage.getItem('global_click_counter')) {
            localStorage.setItem('global_click_counter', '0');
        }

        function verificarStatusDoMes() {
            const ultimaInteracao = localStorage.getItem('cs_ultima_interacao_mes');
            if (!ultimaInteracao) return null;
            
            const dataAtual = new Date();
            const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
            
            if (ultimaInteracao === mesAnoAtual) {
                return localStorage.getItem('cs_resultado_status');
            }
            return null;
        }

        function salvarStatusDoMes(status) {
            const dataAtual = new Date();
            const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
            localStorage.setItem('cs_ultima_interacao_mes', mesAnoAtual);
            localStorage.setItem('cs_resultado_status', status);
        }

        btnInsta.addEventListener('click', () => {
            statusMessage.style.color = "var(--neon-purple)";
            statusMessage.innerText = "VERIFICANDO PERFIL... AGUARDE.";
            
            setTimeout(() => {
                const statusAtual = verificarStatusDoMes();
                
                if (statusAtual === 'ganhou') {
                    statusMessage.innerText = "CUPOM DO MÊS JÁ GARANTIDO ABAIXO.";
                    return;
                }
                
                if (statusAtual === 'perdeu') {
                    statusMessage.style.color = "#ff4a4a";
                    statusMessage.innerText = "Não foi dessa vez! Tente no próximo mês.";
                    return;
                }

                btnLucky.removeAttribute('disabled');
                statusMessage.innerText = "BOTÃO LIBERADO! BOA SORTE.";
            }, 3000);
        });

        btnLucky.addEventListener('click', () => {
            const statusAtual = verificarStatusDoMes();
            if (statusAtual) return;

            let cliques = parseInt(localStorage.getItem('global_click_counter')) || 0;
            cliques++;
            localStorage.setItem('global_click_counter', cliques.toString());

            if (cliques % 500 === 0) {
                salvarStatusDoMes('ganhou');

                couponCode.innerText = CODIGO_CUPOM;
                couponBox.style.display = 'block';
                statusMessage.innerText = "";
                btnLucky.setAttribute('disabled', 'true');
                btnInsta.style.display = 'none';
            } else {
                salvarStatusDoMes('perdeu');
                
                statusMessage.style.color = "#ff4a4a"; 
                statusMessage.innerText = "Não foi dessa vez! Tente no próximo mês.";
                btnLucky.setAttribute('disabled', 'true');
            }
        });

        const statusInicial = verificarStatusDoMes();
        if (statusInicial === 'ganhou') {
            statusMessage.innerText = "CUPOM DO MÊS JÁ GARANTIDO.";
            btnInsta.style.display = 'none';
            btnLucky.style.display = 'none';
            couponCode.innerText = CODIGO_CUPOM;
            couponBox.style.display = 'block';
        } else if (statusInicial === 'perdeu') {
            statusMessage.style.color = "#ff4a4a";
            statusMessage.innerText = "Não foi dessa vez! Tente no próximo mês.";
            btnInsta.style.display = 'none';
            btnLucky.style.display = 'none';
        }
    </script>
</body>
</html>
