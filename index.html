<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupom da Sorte - Centro Automobilístico CS</title>
    <style>
        :root {
            --primary: #8e2de2;
            --secondary: #4a00e0;
            --background: #121214;
            --surface: #1e1e24;
            --text: #ffffff;
            --text-muted: #a0a0b0;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            text-decoration: none;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }

        .btn-insta:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-lucky {
            background: var(--primary);
            color: white;
        }

        .btn-lucky:hover:not(:disabled) {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-lucky:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
        }

        .coupon-box {
            margin-top: 25px;
            padding: 20px;
            border: 2px dashed var(--success);
            background: rgba(0, 230, 118, 0.1);
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .coupon-code {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
            min-height: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tente a Sorte! 🍀</h1>
        <p>Siga nosso perfil no Instagram para liberar o botão e tentar ganhar um cupom de desconto exclusivo.</p>

        <!-- Link direto atualizado para o seu perfil -->
        <a href="https://www.instagram.com/centroautomobilistico.cs/" target="_blank" id="btn-insta" class="btn btn-insta">
            1. Siga no Instagram
        </a>

        <!-- Botão de Sorteio -->
        <button id="btn-lucky" class="btn btn-lucky" disabled>
            2. Tentar a Sorte
        </button>

        <div id="status-message" class="status-text"></div>

        <!-- Área Secreta do Cupom -->
        <div id="coupon-box" class="coupon-box">
            <p style="margin-bottom: 5px; color: var(--success);">🎉 PARABÉNS! Você deu sorte!</p>
            <div class="coupon-code" id="coupon-code">CSDEZ</div>
            <p class="status-text" style="margin-top: 10px;">Tire um print ou copie o código acima para usar no seu atendimento.</p>
        </div>
    </div>

    <script>
        // Altere aqui o nome do cupom se quiser trocar no futuro
        const CODIGO_CUPOM = "CSDEZ"; 

        const btnInsta = document.getElementById('btn-insta');
        const btnLucky = document.getElementById('btn-lucky');
        const couponBox = document.getElementById('coupon-box');
        const couponCode = document.getElementById('coupon-code');
        const statusMessage = document.getElementById('status-message');

        if (!localStorage.getItem('global_click_counter')) {
            localStorage.setItem('global_click_counter', '0');
        }

        function jaPegouCupomEsteMes() {
            const ultimaVitoria = localStorage.getItem('cs_ultima_vitoria');
            if (!ultimaVitoria) return false;
            
            const dataAtual = new Date();
            const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
            
            return ultimaVitoria === mesAnoAtual;
        }

        // Validação do clique
        btnInsta.addEventListener('click', () => {
            statusMessage.innerText = "Verificando... Aguarde um instante.";
            
            setTimeout(() => {
                if (jaPegouCupomEsteMes()) {
                    statusMessage.innerText = "Você já garantiu seu cupom este mês!";
                    return;
                }
                btnLucky.removeAttribute('disabled');
                statusMessage.innerText = "Botão liberado! Clique em Tentar a Sorte.";
            }, 3000);
        });

        // Lógica secreta do sorteio
        btnLucky.addEventListener('click', () => {
            if (jaPegouCupomEsteMes()) {
                alert("Você já ganhou um cupom este mês!");
                return;
            }

            let cliques = parseInt(localStorage.getItem('global_click_counter')) || 0;
            cliques++;
            localStorage.setItem('global_click_counter', cliques.toString());

            // Regra secreta: 1 a cada 500 cliques ganha
            if (cliques % 500 === 0) {
                const dataAtual = new Date();
                const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
                localStorage.setItem('cs_ultima_vitoria', mesAnoAtual);

                couponCode.innerText = CODIGO_CUPOM;
                couponBox.style.display = 'block';
                statusMessage.innerText = "";
                btnLucky.setAttribute('disabled', 'true');
                btnInsta.style.display = 'none';
            } else {
                statusMessage.innerText = "Não foi dessa vez! Quem sabe no próximo clique? Tente novamente.";
                btnLucky.setAttribute('disabled', 'true');
            }
        });

        // Trava para quem já ganhou no mês atual
        if (jaPegouCupomEsteMes()) {
            statusMessage.innerText = "Você já resgatou seu cupom deste mês.";
            btnInsta.style.display = 'none';
            btnLucky.style.display = 'none';
            couponCode.innerText = CODIGO_CUPOM;
            couponBox.style.display = 'block';
        }
    </script>
</body>
</html>
