<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Automobilístico CS | Cupom Exclusivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(26, 29, 38, 0.75);
            --neon-cyan: #00f2fe;
            --neon-purple: #4facfe;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #00ff87;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Fundo Dinâmico com Fotos Automotivas Estilizadas */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(11, 12, 16, 0.92), rgba(26, 29, 38, 0.85)),
                url('https://images.unsplash.com/photo-1616788494707-ec28f08d05a1?auto=format&fit=crop&q=80&w=1920') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* Detalhes de Luz Neon de Fundo (Glow Effect) */
        .neon-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 15%;
            z-index: -1;
            pointer-events: none;
        }

        /* Container Principal Premium */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Header Visual */
        .brand-badge {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 1px;
            line-height: 1.3;
            margin-bottom: 12px;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Grid de Imagens de Destaque Inspiradas no Instagram */
        .insta-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 35px;
            border-radius: 12px;
            overflow: hidden;
        }

        .insta-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            filter: grayscale(30%) brightness(0.8);
            transition: all 0.4s ease;
            border-radius: 6px;
        }

        .insta-preview-grid:hover .insta-img {
            filter: grayscale(0%) brightness(1);
        }

        /* Botões Estilizados */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            margin-bottom: 16px;
        }

        .btn-insta {
            background: linear-gradient(135deg, #f09433 0%, #dc2743 50%, #bc1888 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3);
        }

        .btn-insta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 39, 67, 0.5);
        }

        .btn-lucky {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            color: #0b0c10;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn-lucky:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        .btn-lucky:disabled {
            background: #232630;
            color: #525866;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Mensagens de Feedback */
        .status-box {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            min-height: 25px;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Painel Secreto do Cupom (Estilo Bilhete Premium) */
        .coupon-wrapper {
            margin-top: 30px;
            padding: 24px;
            background: rgba(0, 255, 135, 0.05);
            border: 2px dashed rgba(0, 255, 135, 0.3);
            border-radius: 16px;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .coupon-title {
            color: var(--success);
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .coupon-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success);
            letter-spacing: 4px;
            background: rgba(0, 255, 135, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.3);
        }

        .coupon-instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 12px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="neon-glow"></div>

    <div class="card">
        <div class="brand-badge">CENTRO AUTOMOBILÍSTICO CS</div>
        <h1>Performance & Sorte</h1>
        <p class="subtitle">Desbloqueie nossa oferta oculta para cuidar do seu motor.</p>

        <div class="insta-preview-grid">
            <img class="insta-img" src="https://images.unsplash.com/photo-1486006920555-c77dce18193b?auto=format&fit=crop&q=60&w=300" alt="Motor">
            <img class="insta-img" src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738?auto=format&fit=crop&q=60&w=300" alt="Rodas">
            <img class="insta-img" src="https://images.unsplash.com/photo-1507136566006-cfc505b114fc?auto=format&fit=crop&q=60&w=300" alt="Oficina">
        </div>

        <a href="https://www.instagram.com/centroautomobilistico.cs/" target="_blank" id="btn-insta" class="btn btn-insta">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Seguir Instagram
        </a>

        <button id="btn-lucky" class="btn btn-lucky" disabled>
            Tentar a Sorte
        </button>

        <div id="status-message" class="status-box"></div>

        <div id="coupon-box" class="coupon-wrapper">
            <div class="coupon-title">⚡ Veículo Premiado ⚡</div>
            <div class="coupon-code" id="coupon-code">CSDEZ</div>
            <p class="coupon-instructions">Tire um print da tela para validar seu desconto no atendimento!</p>
        </div>
    </div>

    <script>
        const CODIGO_CUPOM = "CSDEZ"; 

        const btnInsta = document.getElementById('btn-insta');
        const btnLucky = document.getElementById('btn-lucky');
        const couponBox = document.getElementById('coupon-box');
        const couponCode = document.getElementById('coupon-code');
        const statusMessage = document.getElementById('status-message');

        if (!localStorage.getItem('global_click_counter')) {
            localStorage.setItem('global_click_counter', '0');
        }

        function jaPegouCupomEsteMes() {
            const ultimaVitoria = localStorage.getItem('cs_ultima_vitoria');
            if (!ultimaVitoria) return false;
            
            const dataAtual = new Date();
            const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
            
            return ultimaVitoria === mesAnoAtual;
        }

        btnInsta.addEventListener('click', () => {
            statusMessage.innerText = "ESCANEANDO PERFIL... AGUARDE.";
            
            setTimeout(() => {
                if (jaPegouCupomEsteMes()) {
                    statusMessage.innerText = "ACESSO NEGADO: Limite mensal atingido.";
                    return;
                }
                btnLucky.removeAttribute('disabled');
                statusMessage.innerText = "BOTÃO DE SORTE LIBERADO!";
            }, 3000);
        });

        btnLucky.addEventListener('click', () => {
            if (jaPegouCupomEsteMes()) {
                alert("Você já ganhou um cupom este mês!");
                return;
            }

            let cliques = parseInt(localStorage.getItem('global_click_counter')) || 0;
            cliques++;
            localStorage.setItem('global_click_counter', cliques.toString());

            // Regra secreta: 1 ganha a cada 500 cliques
            if (cliques % 500 === 0) {
                const dataAtual = new Date();
                const mesAnoAtual = `${dataAtual.getMonth()}-${dataAtual.getFullYear()}`;
                localStorage.setItem('cs_ultima_vitoria', mesAnoAtual);

                couponCode.innerText = CODIGO_CUPOM;
                couponBox.style.display = 'block';
                statusMessage.innerText = "";
                btnLucky.setAttribute('disabled', 'true');
                btnInsta.style.display = 'none';
            } else {
                statusMessage.innerText = "NÃO FOI DESSA VEZ! TENTE NOVAMENTE.";
                btnLucky.setAttribute('disabled', 'true');
            }
        });

        if (jaPegouCupomEsteMes()) {
            statusMessage.innerText = "CUPOM DO MÊS JÁ GARANTIDO.";
            btnInsta.style.display = 'none';
            btnLucky.style.display = 'none';
            couponCode.innerText = CODIGO_CUPOM;
            couponBox.style.display = 'block';
        }
    </script>
</body>
</html>
